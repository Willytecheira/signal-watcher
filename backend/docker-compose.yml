services:
  signal-monitor:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKERS: "65.108.235.150:9092"
      KAFKA_TOPIC: "bridgewise.alerts.normalized"
      KAFKA_GROUP_ID: "lovable-signals-app"
      PORT: "3000"
      DB_PATH: "/data/signals.db"
    volumes:
      - signals-data:/data
    restart: unless-stopped

volumes:
  signals-data:
